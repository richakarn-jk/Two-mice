
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Mice POS - Online System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .menu-card { transition: all 0.2s; cursor: pointer; }
        .menu-card:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <nav class="bg-indigo-700 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center">Two Mice POS 🖱️</h1>
            <div class="flex space-x-2">
                <button onclick="showTab('pos')" class="px-4 py-2 rounded-lg hover:bg-indigo-800 transition">หน้าขาย</button>
                <button onclick="showTab('dash')" class="px-4 py-2 rounded-lg hover:bg-indigo-800 transition">สรุปยอด</button>
                <button onclick="showTab('crm')" class="px-4 py-2 rounded-lg hover:bg-indigo-800 transition">สมาชิก</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4">
        
        <div id="pos" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div id="menu-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                        </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-xl border h-fit sticky top-24">
                    <h2 class="text-lg font-bold mb-4 border-b pb-2">ออเดอร์ปัจจุบัน</h2>
                    <input type="text" id="custPhone" placeholder="เบอร์โทรสะสมแต้ม" class="w-full p-3 mb-4 border rounded-xl text-center text-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <div id="cart-list" class="space-y-2 mb-4 max-h-60 overflow-y-auto font-light"></div>
                    <div class="border-t pt-4">
                        <div class="flex justify-between text-2xl font-bold text-indigo-700">
                            <span>ยอดรวม:</span>
                            <span><span id="total-price">0</span>.-</span>
                        </div>
                        <button onclick="checkout()" class="w-full bg-green-500 text-white py-4 rounded-xl mt-4 font-bold text-xl shadow-lg hover:bg-green-600 transition">ยืนยันการขาย</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="dash" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-6 rounded-xl shadow border-l-8 border-green-500 text-center">
                    <p class="text-gray-500 uppercase text-xs tracking-wider">ยอดขายรวม (บาท)</p>
                    <h3 id="stat-money" class="text-4xl font-bold text-gray-800">0</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border-l-8 border-blue-500 text-center">
                    <p class="text-gray-500 uppercase text-xs tracking-wider">จำนวนแก้วทั้งหมด</p>
                    <h3 id="stat-cups" class="text-4xl font-bold text-gray-800">0</h3>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-gray-600 text-sm">
                        <tr>
                            <th class="p-4">เวลา</th>
                            <th class="p-4">รายการ</th>
                            <th class="p-4 text-right">จำนวนเงิน</th>
                            <th class="p-4 text-center">ลบ</th>
                        </tr>
                    </thead>
                    <tbody id="sales-history" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <div id="crm" class="tab-content">
            <div class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl border text-center">
                <h2 class="text-2xl font-bold mb-6">ค้นหาสมาชิก</h2>
                <input type="text" id="searchPhone" placeholder="กรอกเบอร์โทรศัพท์" class="w-full p-4 border rounded-2xl mb-4 text-center text-2xl">
                <button onclick="checkPoints()" class="w-full bg-indigo-600 text-white py-3 rounded-2xl font-bold hover:bg-indigo-700 transition">ตรวจสอบแต้ม</button>
                <div id="point-box" class="hidden mt-8 p-6 bg-indigo-50 rounded-2xl border-2 border-indigo-100">
                    <p class="text-gray-500">แต้มสะสมทั้งหมด</p>
                    <h1 id="res-points" class="text-6xl font-bold text-indigo-700 my-2">0</h1>
                    <p class="text-sm text-indigo-400">1 แก้ว = 1 แต้ม</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- ส่วนการตั้งค่า Firebase ที่คุณให้มา ---
        const firebaseConfig = {
            apiKey: "AIzaSyCTZ9MqTirZkosidhpHgnlH4a5TR_XxhLA",
            authDomain: "two-mice-57341.firebaseapp.com",
            projectId: "two-mice-57341",
            storageBucket: "two-mice-57341.firebasestorage.app",
            messagingSenderId: "361252970949",
            appId: "1:361252970949:web:038eb1395257cb8d4cabac",
            measurementId: "G-WHWXFE123B"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ข้อมูลเมนูทั้งหมด
        const menuItems = [
            {n: 'ดาร์กวาเลท', p: 29, c: 'ทูโทน'}, {n: 'ดาร์กแมนดาริน', p: 29, c: 'ทูโทน'}, {n: 'ดาร์กคอฟฟี่', p: 29, c: 'ทูโทน'}, {n: 'ดาร์กบราว', p: 29, c: 'ทูโทน'}, {n: 'เขียวสตอ', p: 29, c: 'ทูโทน'},
            {n: 'มอคคา', p: 20, c: 'กาแฟ'}, {n: 'คาปูชิโน', p: 20, c: 'กาแฟ'}, {n: 'ลาเต้', p: 20, c: 'กาแฟ'},
            {n: 'ไต้หวันบราว', p: 20, c: 'บราวชูการ์'}, {n: 'ชาไทยบราว', p: 20, c: 'บราวชูการ์'}, {n: 'ชาเขียวบราว', p: 20, c: 'บราวชูการ์'},
            {n: 'ไต้หวัน', p: 20, c: 'ชาธรรมดา'}, {n: 'ชาเขียว', p: 20, c: 'ชาธรรมดา'}, {n: 'ชาไทย', p: 20, c: 'ชาธรรมดา'},
            {n: 'เผือก', p: 20, c: 'นมสด'}, {n: 'แคนตาลูป', p: 20, c: 'นมสด'}, {n: 'สตอ', p: 20, c: 'นมสด'}, {n: 'ส้มแมนดาริน', p: 20, c: 'นมสด'},
            {n: 'ดาร์กนมสด', p: 29, c: 'นมสดธรรมดา'}, {n: 'เขียวสตอ', p: 20, c: 'ชาใส'}, {n: 'ลิ้นจี่', p: 20, c: 'โซดา'}, {n: 'โค้ก', p: 25, c: 'น้ำอัดลม'},
            {n: 'ไข่มุก', p: 0, c: 'ท้อปปิ้ง'}
        ];

        let cart = [];

        // แสดงรายการเมนู
        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            menuItems.forEach(item => {
                grid.innerHTML += `
                    <div onclick="addToCart('${item.n}', ${item.p})" class="menu-card bg-white p-4 rounded-xl shadow-sm border-b-4 border-indigo-200 hover:border-indigo-500">
                        <p class="text-[10px] text-gray-400 uppercase">${item.c}</p>
                        <p class="font-bold text-gray-700">${item.n}</p>
                        <p class="text-indigo-600 font-bold">${item.p}.-</p>
                    </div>`;
            });
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            let total = 0; list.innerHTML = '';
            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `<div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                    <span>${item.name}</span>
                    <div><span class="font-bold mr-2">${item.price}</span>
                    <button onclick="cart.splice(${index},1);updateCartUI()" class="text-red-400">✕</button></div>
                </div>`;
            });
            document.getElementById('total-price').innerText = total;
        }

        async function checkout() {
            if (cart.length === 0) return;
            const phone = document.getElementById('custPhone').value.trim() || "ทั่วไป";
            const total = parseInt(document.getElementById('total-price').innerText);
            const cups = cart.filter(i => i.price > 0).length;

            const saleData = {
                time: Date.now(),
                items: cart,
                total: total,
                cups: cups,
                customer: phone
            };

            const newSaleRef = db.ref('sales').push();
            await newSaleRef.set(saleData);

            if (phone !== "ทั่วไป") {
                db.ref('members/' + phone).transaction(current => (current || 0) + cups);
            }

            cart = [];
            document.getElementById('custPhone').value = '';
            updateCartUI();
            alert("บันทึกการขายสำเร็จ!");
        }

        // ระบบ Real-time Dashboard
        db.ref('sales').on('value', snapshot => {
            const data = snapshot.val();
            const history = document.getElementById('sales-history');
            let totalM = 0; let totalC = 0;
            history.innerHTML = '';

            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const s = data[id];
                    totalM += s.total; totalC += s.cups;
                    const date = new Date(s.time).toLocaleTimeString();
                    history.innerHTML += `
                        <tr>
                            <td class="p-4 text-xs text-gray-400">${date}</td>
                            <td class="p-4 text-sm">${s.items.map(i => i.name).join(', ')}<br><small class="text-gray-400">เบอร์: ${s.customer}</small></td>
                            <td class="p-4 text-right font-bold text-indigo-600">${s.total}.-</td>
                            <td class="p-4 text-center"><button onclick="deleteSale('${id}')" class="text-red-300 hover:text-red-600">🗑️</button></td>
                        </tr>`;
                });
            }
            document.getElementById('stat-money').innerText = totalM.toLocaleString();
            document.getElementById('stat-cups').innerText = totalC.toLocaleString();
        });

        async function deleteSale(id) {
            if (!confirm("ยืนยันการลบรายการนี้? แต้มของลูกค้าจะถูกหักคืนด้วย")) return;
            const snap = await db.ref('sales/' + id).once('value');
            const sale = snap.val();
            if (sale.customer !== "ทั่วไป") {
                db.ref('members/' + sale.customer).transaction(current => (current || 0) - sale.cups);
            }
            db.ref('sales/' + id).remove();
        }

        function checkPoints() {
            const phone = document.getElementById('searchPhone').value;
            db.ref('members/' + phone).once('value', snap => {
                document.getElementById('point-box').classList.remove('hidden');
                document.getElementById('res-points').innerText = snap.val() || 0;
            });
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        renderMenu();
    </script>
</body>
</html>
